<!DOCTYPE html>
<html>
<body>

<h2>Admin Panel</h2>

<h3>Users</h3>
<div id="users"></div>

<h3>Transactions</h3>
<div id="txns"></div>

<script>
async function load() {
  const u = await fetch("/api/users/all");
  const users = await u.json();

  const t = await fetch("/api/transactions");
  const txns = await t.json();

  users.innerHTML = users.map(x => `<p>${x.name} ₹${x.balance}</p>`).join("");
  txns.innerHTML = txns.map(x => `<p>${x.fromUser} → ${x.toUser} ₹${x.amount}</p>`).join("");
}

load();
</script>

</body>
</html>
