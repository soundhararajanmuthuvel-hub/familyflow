<script>
  async function loadDashboard() {
    const dashboardContainer = document.getElementById('dashboard-content');
    
    try {
      const response = await fetch('/api/users/details');
      const users = await response.json();

      // Task 4: Prevent crashes using Array.isArray check
      const safeUsers = Array.isArray(users) ? users : [];

      if (safeUsers.length === 0) {
        dashboardContainer.innerHTML = '<p class="warn">No user data found.</p>';
        return;
      }

      dashboardContainer.innerHTML = safeUsers.map(user => `
        <div class="user-card">
          <h3>${user.name}</h3>
          <p>Family: ${user.familyName}</p>
        </div>
      `).join('');

    } catch (error) {
      console.error("Frontend Error:", error);
      // Add fallback UI if API fails
      dashboardContainer.innerHTML = `
        <div class="error-msg">
          ⚠️ Failed to load dashboard data. Please check your connection.
        </div>`;
    }
  }

  async function loadStats() {
    try {
      const res = await fetch('/api/transactions/stats');
      const data = await res.json();
      
      const safeData = Array.isArray(data) ? data : [];
      const statsList = document.getElementById('stats-list');
      
      statsList.innerHTML = safeData.map(item => `
        <li>${item._id}: $${item.totalAmount}</li>
      `).join('') || '<li>No stats available</li>';
    } catch (err) {
      console.error("Stats Error:", err);
    }
  }
</script>
